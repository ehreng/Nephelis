name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate content schemas
        run: pnpm validate:content

      - name: Mass budget hygiene
        run: pnpm check:mass

      - name: Power budget sanity
        run: pnpm check:power

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Build should not require secrets; APIs fail soft at runtime
          NEXT_TELEMETRY_DISABLED: '1'
