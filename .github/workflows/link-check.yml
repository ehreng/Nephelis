name: Heritage link check

on:
  schedule:
    # Sundays 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:
  pull_request:
    paths:
      - 'site/content/data/heritage.json'

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check heritage links
        run: npx --yes tsx automation/scripts/link-check.ts
        env:
          LINK_TIMEOUT_MS: '15000'
